timing:
  device_activation_interval_ms: 1000
  experiment_running_ms: 1000
  experiment_complete_ms: 500
  experiment_gap_ms: 500

global_target:
  tg: 580.0
  cte: 7.2
  dielectric: 5.8
  dielectric_const: 2.6
  weights:
    tg: 1.0
    cte: 1.0
    dielectric: 1.0
    dielectric_const: 1.0

auto_tune_enabled: true

random_range:
  tg:              { min: 450, max: 590 }
  cte:             { min: 7.0, max: 12.0 }
  dielectric:      { min: 5.5, max: 8.5 }
  dielectric_const: { min: 2.4, max: 5.5 }

devices:
  - id: scale
    name: 저울
    model: "A&D FX-3000i"
    protocol: RS-232
    ip: 192.168.1.10
    port: 5001
    connected: true

  - id: mixer
    name: 믹서
    model: "IKA RW 20"
    protocol: RS-485
    ip: 192.168.1.11
    port: 5002
    connected: true

  - id: furnace
    name: 전기로
    model: "Carbolite RHF 14/8"
    protocol: Ethernet
    ip: 192.168.1.12
    port: 5003
    connected: true

  - id: anneal
    name: 서냉로
    model: "Nabertherm L3/11"
    protocol: Ethernet
    ip: 192.168.1.13
    port: 5004
    connected: true

  - id: press
    name: 프레스
    model: "Struers Tegramin-25"
    protocol: RS-485
    ip: 192.168.1.14
    port: 5005
    connected: true

  - id: dta
    name: DTA
    model: "Netzsch STA 449 F3"
    protocol: Ethernet
    ip: 192.168.1.16
    port: 5007
    connected: true
    measures: [Tg]

  - id: dsc
    name: DSC
    model: "TA Instruments DSC 250"
    protocol: Ethernet
    ip: 192.168.1.17
    port: 5008
    connected: true
    measures: [Tg]

  - id: dilatometer
    name: 딜라토미터
    model: "Netzsch DIL 402 C"
    protocol: Ethernet
    ip: 192.168.1.18
    port: 5009
    connected: true
    measures: [CTE]

  - id: permittivity
    name: 유전율측정기
    model: "Agilent E4980A"
    protocol: Ethernet
    ip: 192.168.1.19
    port: 5010
    connected: true
    measures: [유전율, 유전상수]

