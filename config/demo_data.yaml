timing:
  device_activation_interval_ms: 500
  experiment_running_ms: 500
  experiment_complete_ms: 250
  experiment_gap_ms: 250

global_target:
  tg: 580.0
  cte: 7.2
  dielectric: 5.8
  dielectric_const: 2.6
  weights:
    tg: 1.0
    cte: 1.0
    dielectric: 1.0
    dielectric_const: 1.0

auto_tune_enabled: true

random_range:
  tg:              { min: 450, max: 590 }
  cte:             { min: 7.0, max: 12.0 }
  dielectric:      { min: 5.5, max: 8.5 }
  dielectric_const: { min: 2.4, max: 5.5 }

devices:
  - id: scale
    name: 저울
    model: "A&D FX-3000i"
    protocol: RS-232
    ip: 192.168.1.10
    port: 5001
    connected: true

  - id: mixer
    name: 믹서
    model: "IKA RW 20"
    protocol: RS-485
    ip: 192.168.1.11
    port: 5002
    connected: true

  - id: furnace
    name: 전기로
    model: "Carbolite RHF 14/8"
    protocol: Ethernet
    ip: 192.168.1.12
    port: 5003
    connected: true

  - id: anneal
    name: 서냉로
    model: "Nabertherm L3/11"
    protocol: Ethernet
    ip: 192.168.1.13
    port: 5004
    connected: true

  - id: press
    name: 프레스
    model: "Struers Tegramin-25"
    protocol: RS-485
    ip: 192.168.1.14
    port: 5005
    connected: true

  - id: dta
    name: DTA
    model: "Netzsch STA 449 F3"
    protocol: Ethernet
    ip: 192.168.1.16
    port: 5007
    connected: true
    measures: [Tg]

  - id: dsc
    name: DSC
    model: "TA Instruments DSC 250"
    protocol: Ethernet
    ip: 192.168.1.17
    port: 5008
    connected: true
    measures: [Tg]

  - id: dilatometer
    name: 딜라토미터
    model: "Netzsch DIL 402 C"
    protocol: Ethernet
    ip: 192.168.1.18
    port: 5009
    connected: true
    measures: [CTE]

  - id: permittivity
    name: 유전율측정기
    model: "Agilent E4980A"
    protocol: Ethernet
    ip: 192.168.1.19
    port: 5010
    connected: true
    measures: [유전율, 유전상수]

# ── BO 기반 수렴 시나리오 ──────────────────────────────────────────────────
# predicted : 현재 BO 모델이 예측한 값 (초기=낙관적≈목표치, 후반=실측 근접)
# measurement: 실제 실험 측정값 (초기=목표와 멀고 부동소수, 후반=목표 수렴)
#
# LIS (예측 정확도): 0.63 → 0.67 → 0.65 → 0.91 → 0.96 → 0.98 → 0.99 → 0.99 → 1.0 → 1.0
# TAS (목표 달성도): 0.42 → 0.50 → 0.45 → 0.62 → 0.57↓ → 0.77 → 0.86 → 0.83↓ → 0.93 → 0.99
#
# S-003: 방향 실패로 LIS·TAS 동반 하락
# S-004: 모델 캘리브레이션 돌파 → LIS 0.65→0.91 급등
# S-005: LIS 계속 오르는데 TAS는 오히려 하락 (모델 정확↑, 그러나 조성이 목표 도달 미달)
# S-008: LIS 유지, TAS 소폭 하락
samples:

  # ── S-001: 출발점. 모델 낙관적(pred≈목표), 실측은 목표와 멀다 ────────────
  - id: S-001
    composition: "SiO2:69.8, Al2O3:12.3, B2O3:17.9"
    predicted:
      tg: 576.2
      cte: 7.18
      dielectric: 5.76
      dielectric_const: 2.57
    measurement:
      tg: 456.3
      cte: 11.84
      dielectric: 8.47
      dielectric_const: 5.28
    next_composition: "SiO2:70.2, Al2O3:14.1, B2O3:15.7"
    experiment:
      scale:
        target_weight: 150.0
        current_weight: 149.6
      mixer:
        operation_time: "30min"
      furnace:
        steps:
          - { step: 1, target_temp: 750,  measured_temp: 747,  hold_time: "30min", heating_rate: 5  }
          - { step: 2, target_temp: 1350, measured_temp: 1347, hold_time: "60min", heating_rate: 10 }
